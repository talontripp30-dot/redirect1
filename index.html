<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🛑Close tab to stop🛑</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        a {
            color: #0366d6;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <p>You are now in a loop. Stop the loop by closing pop-ups.</p>
    <!-- Fallback link in case the browser blocks the automatic pop-up -->
    <p>If nothing happens, allow pop-ups. This is an experiment. <a id="redirect-link" href="https://redirect-loop.github.io/redirect1/" target="_blank" rel="noopener noreferrer">click here to try again.</a>.</p>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const destination = "https://redirect-loop.github.io/redirect1/";
            
            // Attempt to open the target website in a new tab
            const newTab = window.open(destination, '_blank');
            
            // If the browser blocks the pop-up, focus the fallback link for the user
            if (!newTab || newTab.closed || typeof newTab.closed === 'undefined') {
                document.getElementById('redirect-link').focus();
            }
        });
    </script>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const destination = "https://dictionary.com";
            
            // Attempt to open the target website in a new tab
            const newTab = window.open(destination, '_blank');
            
            // If the browser blocks the pop-up, focus the fallback link for the user
            if (!newTab || newTab.closed || typeof newTab.closed === 'undefined') {
                document.getElementById('redirect-link').focus();
            }
        });
    </script>

</body>
</html>
